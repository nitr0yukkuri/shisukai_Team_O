<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/frontwebsitelogin.css">
    <title>Login</title>
</head>

<body>
    <div class="wrapper">
        <form action="employee_register.php" method="POST">
            <label>Employee ID:</label><br>
        <input type="text" name="employee_id" required><br><br>

        <label>Employee Name:</label><br>
        <input type="text" name="employee_name" required><br><br>

        <label>Department ID:</label><br>
        <input type="text" name="department_id" required><br><br>

        <label>Role:</label><br>
        <select name="role" required>
            <option value="admin">Admin</option>
            <option value="manager">Manager</option>
            <option value="employee">Employee</option>
        </select><br><br>

        <label>Password:</label><br>
        <input type="password" name="password" required><br><br>

        <button type="submit">Register Employee</button>
            </div>
        </form>
    </div>
</body>

</html>
