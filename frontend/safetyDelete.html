<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安否情報削除</title>
    <link rel="stylesheet" href="css/safetyDelete.css">
</head>
<body>
    <header>
        <h3><a href="a">メニュー画面へ</a></h3>
        <h1>安否情報削除</h1>
        <h3><a href="a">ログイン画面へ</a></h3>
    </header>
    <main>
        
        <table>
            <thead>
                <tr>
                    <th>安否</th>
                    <th>現在地</th>
                    <th>名前</th>
                    <th>概要記載欄</th>
                    <th>削除</th>
                </tr>
            </thead>

            <tbody>
                <!-- PHPで安否情報を表示する -->
                 <tr>
                    <td>あ</td>
                    <td>い</td>
                    <td>う</td>
                    <td>え</td>
                     <td><button  class="delete-btn" type="button" onclick="deleteSafetyInfo()">削除</button></td>  <!--  削除ボタンを押したときの処理もPHPで実装する必要があります。関数名はdeleteSafetyInfoです。 -->
                 </tr>
            </tbody>
        </table>
    </main>
